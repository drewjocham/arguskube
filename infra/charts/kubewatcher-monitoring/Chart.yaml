apiVersion: v2
name: kubewatcher-monitoring
description: KubeWatcher monitoring stack — Prometheus + Grafana (LLM servers added separately)
type: application
version: 0.2.0
appVersion: 1.0.0
keywords:
  - kubernetes
  - sre
  - monitoring
  - prometheus
  - grafana
home: https://github.com/drewjocham/kube-watcher
maintainers:
  - name: Argus Infrastructure
    email: dev@argusinfra.com
dependencies:
  - name: kube-prometheus-stack
    version: ">50.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
    alias: prometheus
