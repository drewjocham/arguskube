# ── kube-prometheus-stack (Prometheus + Alertmanager + Grafana) ────
kube-prometheus-stack:
  enabled: true

  prometheus:
    prometheusSpec:
      retention: 30d
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: "null"
      receivers:
        - name: "null"

  grafana:
    enabled: true
    adminPassword: ""
    defaultDashboardsEnabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    persistence:
      enabled: true
      size: 10Gi
