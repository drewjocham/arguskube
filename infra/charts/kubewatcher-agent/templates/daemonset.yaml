apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kubewatcher-agent.fullname" . }}
  labels:
    {{- include "kubewatcher-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kubewatcher-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubewatcher-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubewatcher-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ if .Values.hostNetwork }}ClusterFirstWithHostNet{{ else }}ClusterFirst{{ end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kubewatcher-agent.fullname" . }}-config
          env:
            {{- if .Values.env.saasToken }}
            - name: SAAS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "kubewatcher-agent.fullname" .)) }}
                  key: saas-token
            {{- end }}
            {{- if .Values.env.saasServerURL }}
            - name: SAAS_SERVER_URL
              value: {{ .Values.env.saasServerURL | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
{{- if .Values.vector.enabled }}
        # ── Vector Sidecar ─────────────────────────────────────────
        # Collects pod logs and host metrics from each node.
        # https://vector.dev/docs/reference/configuration/
        - name: vector
          image: "{{ .Values.vector.image.repository }}:{{ .Values.vector.image.tag }}"
          imagePullPolicy: {{ .Values.vector.image.pullPolicy }}
          env:
            - name: VECTOR_LOG_LEVEL
              value: {{ .Values.vector.logLevel | quote }}
            {{- if and .Values.vector.sinks.s3.enabled .Values.vector.sinks.s3.region }}
            - name: AWS_REGION
              value: {{ .Values.vector.sinks.s3.region | quote }}
            {{- end }}
            {{- if .Values.vector.sinks.s3.enabled }}
            - name: S3_LOG_BUCKET
              value: {{ .Values.vector.sinks.s3.bucket | quote }}
            - name: S3_METRICS_BUCKET
              value: {{ .Values.vector.sinks.s3.bucket | quote }}
            {{- end }}
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector/vector.toml
              subPath: vector.toml
              readOnly: true
            - name: varlib
              mountPath: /var/lib
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
          resources:
            {{- toYaml .Values.vector.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
{{- if .Values.vector.enabled }}
      volumes:
        - name: vector-config
          configMap:
            name: {{ include "kubewatcher-agent.fullname" . }}-vector-config
        - name: varlib
          hostPath:
            path: /var/lib
        - name: docker
          hostPath:
            path: /var/lib/docker
        - name: varlog
          hostPath:
            path: /var/log
{{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
