apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alert-ingress.fullname" . }}
  labels:
    {{- include "alert-ingress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alert-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alert-ingress.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort | default 8686 }}
              protocol: TCP
          env:
            - name: VECTOR_LOG_LEVEL
              value: {{ .Values.vector.logLevel | quote }}
            {{- if .Values.sinks.s3.enabled }}
            - name: AWS_REGION
              value: {{ .Values.sinks.s3.region | quote }}
            {{- end }}
            {{- if .Values.sinks.gcpPubSub.enabled }}
            - name: GOOGLE_CLOUD_PROJECT
              value: {{ .Values.sinks.gcpPubSub.project | quote }}
            - name: PUBSUB_TOPIC
              value: {{ .Values.sinks.gcpPubSub.topic | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/vector/vector.toml
              subPath: vector.toml
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: {{ include "alert-ingress.fullname" . }}-vector-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
