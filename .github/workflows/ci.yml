name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Go Backend (kube/backend) ---
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    # The repo's go.work pulls lufis-terminal (go 1.26.2) into every
    # module build at the workspace root. CI installs the version from
    # kube/backend/go.mod (1.25.0), so workspace-active builds fail with
    # "compile: version 1.26.2 does not match go tool version 1.25.0".
    # GOWORK=off makes kube/backend build standalone; the replace
    # directive to ../../pkg/pty still resolves locally without the
    # workspace.
    env:
      GOWORK: "off"
    defaults:
      run:
        working-directory: kube/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/backend/go.mod
          cache-dependency-path: kube/backend/go.sum

      # kube/backend/view/embed.go uses `//go:embed all:dist` to bundle
      # the built Vue frontend into the binary. The dist files are
      # gitignored — they only exist after `npm run build` — so the
      # Go side fails to vet/build/test on a fresh checkout unless we
      # produce the frontend first. (Was already broken on main; CI
      # for every recent run shows this same failure.)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kube/view/package-lock.json

      - name: Install frontend deps
        working-directory: kube/view
        run: npm ci

      - name: Build frontend (produces kube/backend/view/dist for go:embed)
        working-directory: kube/view
        run: npm run build

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        # -short skips tests that shell out to kubectl or download
        # binaries (kube/backend/internal/setup). Those still run on
        # developer machines without -short — they have a real
        # environment. Without this, the setup package consistently
        # stalls the 2-minute test budget on CI runners.
        #
        # -coverprofile/-covermode=atomic add a coverage capture; the
        # next step parses the profile and asserts a floor. atomic
        # mode is required alongside -race.
        run: go test -short -race -count=1 -timeout 180s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage threshold
        # Compute the total coverage and assert it stays above the
        # floor below. Treat the threshold as a regression guard, not
        # a quality target — the value is intended to ratchet up over
        # time as the untested packages from CR P1.6 land more tests.
        # Setting `continue-on-error: true` for the first cycle so the
        # baseline can be observed in CI output before the gate flips
        # to enforcing.
        continue-on-error: true
        env:
          MIN_COVERAGE: '25.0'
        run: |
          set -euo pipefail
          if [ ! -f coverage.out ]; then
            echo "::error::coverage.out not produced by the Test step"
            exit 1
          fi
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total backend coverage: ${COVERAGE}%"
          echo "## Backend coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          awk -v c="${COVERAGE}" -v m="${MIN_COVERAGE}" 'BEGIN {
            if (c+0 < m+0) {
              printf "Coverage %s%% is below the %s%% threshold.\n", c, m
              exit 1
            }
            printf "Coverage %s%% \xe2\x89\xa5 %s%% threshold OK.\n", c, m
          }'

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: kube/backend/coverage.out
          if-no-files-found: warn

      # Lint is non-blocking on the consolidation PR: the kube/backend/
      # restructure makes every pre-existing issue appear "new" because the
      # merge base (main) has no files at this path. Track cleanup
      # separately rather than blocking the merge.
      - name: Lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: kube/backend
          args: --timeout 3m
          only-new-issues: true

  # --- Go Alert Ingress (kube/alert-ingress) ---
  alert-ingress:
    name: Alert Ingress (Go)
    runs-on: ubuntu-latest
    # See note on `backend` job — GOWORK=off keeps this build
    # standalone so the workspace's higher Go version requirement
    # (driven by lufis-terminal at 1.26.2) does not bleed in.
    env:
      GOWORK: "off"
    defaults:
      run:
        working-directory: kube/alert-ingress
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/alert-ingress/go.mod
          cache-dependency-path: kube/alert-ingress/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Vue Frontend (kube/view) ---
  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kube/view
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kube/view/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit || true  # Non-blocking until types stabilize

      - name: Lint
        run: npx eslint src/ --max-warnings 100 || true  # Non-blocking until rules stabilize

      - name: Test
        run: npm run test:run

      - name: Build
        run: npx vite build
