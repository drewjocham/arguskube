name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Go Backend (kube/backend) ---
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    # The repo's go.work pulls lufis-terminal (go 1.26.2) into every
    # module build at the workspace root. CI installs the version from
    # kube/backend/go.mod (1.25.0), so workspace-active builds fail with
    # "compile: version 1.26.2 does not match go tool version 1.25.0".
    # GOWORK=off makes kube/backend build standalone; the replace
    # directive to ../../pkg/pty still resolves locally without the
    # workspace.
    env:
      GOWORK: "off"
    defaults:
      run:
        working-directory: kube/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/backend/go.mod
          cache-dependency-path: kube/backend/go.sum

      # kube/backend/view/embed.go uses `//go:embed all:dist` to bundle
      # the built Vue frontend into the binary. The dist files are
      # gitignored — they only exist after `npm run build` — so the
      # Go side fails to vet/build/test on a fresh checkout unless we
      # produce the frontend first.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kube/view/package-lock.json

      - name: Install frontend deps
        working-directory: kube/view
        run: npm ci

      - name: Build frontend (produces kube/backend/view/dist for go:embed)
        working-directory: kube/view
        run: npm run build

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -short -race -count=1 -timeout 180s -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage threshold
        continue-on-error: true
        env:
          MIN_COVERAGE: '25.0'
        run: |
          set -euo pipefail
          if [ ! -f coverage.out ]; then
            echo "::error::coverage.out not produced by the Test step"
            exit 1
          fi
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total backend coverage: ${COVERAGE}%"
          echo "## Backend coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"
          awk -v c="${COVERAGE}" -v m="${MIN_COVERAGE}" 'BEGIN {
            if (c+0 < m+0) {
              printf "Coverage %s%% is below the %s%% threshold.\n", c, m
              exit 1
            }
            printf "Coverage %s%% \xe2\x89\xa5 %s%% threshold OK.\n", c, m
          }'

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: kube/backend/coverage.out
          if-no-files-found: warn

      - name: Lint (new issues blocking)
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: kube/backend
          args: --timeout 3m
          only-new-issues: true

  # --- Go Agent (agent/) ---
  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Terminal (lufis-terminal) ---
  terminal:
    name: Terminal (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lufis-terminal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lufis-terminal/go.mod
          cache-dependency-path: lufis-terminal/go.sum

      # lufis-terminal cgo-depends on github.com/go-gl/glfw and
      # github.com/go-gl/gl, which need X11 and OpenGL development
      # headers at build time. ubuntu-latest images don't ship them.
      - name: Install GLFW/GL system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libglu1-mesa-dev \
            xorg-dev \
            libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxxf86vm-dev \
            pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Go Alert Ingress (kube/alert-ingress) ---
  alert-ingress:
    name: Alert Ingress (Go)
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    defaults:
      run:
        working-directory: kube/alert-ingress
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/alert-ingress/go.mod
          cache-dependency-path: kube/alert-ingress/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Vue Frontend (kube/view) ---
  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kube/view
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kube/view/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit || true

      - name: Lint
        run: npx eslint src/ --max-warnings 100 || true

      - name: Lint (profiles TS — blocking)
        run: |
          npx eslint --max-warnings 0 \
            src/stores/profiles.ts \
            src/stores/profilesSync.ts \
            src/stores/__tests__/profiles.test.ts

      - name: Test
        run: npm run test:run

      - name: Build
        run: npx vite build
