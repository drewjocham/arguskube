name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Go Backend (kube/backend) ---
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kube/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/backend/go.mod
          cache-dependency-path: kube/backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: kube/backend
          args: --timeout 3m
          only-new-issues: true

  # --- Go Agent ---
  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Go Alert Ingress (kube/alert-ingress) ---
  alert-ingress:
    name: Alert Ingress (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kube/alert-ingress
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: kube/alert-ingress/go.mod
          cache-dependency-path: kube/alert-ingress/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

  # --- Vue Frontend (kube/view) ---
  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kube/view
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kube/view/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit || true  # Non-blocking until types stabilize

      - name: Lint
        run: npx eslint src/ --ext .vue,.js,.ts --max-warnings 0 || true  # Non-blocking

      - name: Test
        run: npm run test:run

      - name: Build
        run: npx vite build
