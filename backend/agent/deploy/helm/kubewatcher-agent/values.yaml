# Image configuration
image:
  repository: ghcr.io/drewjocham/kubewatcher-agent
  tag: latest
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Container port
containerPort: 8080

# Environment variables
env:
  PORT: "8080"
  # SAAS_TOKEN: ""  # Set this at deploy time if needed

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

# ServiceAccount
serviceAccount:
  create: true
  name: kubewatcher-agent

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

# Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
