version: "3.9"

# ─── KubeWatcher SaaS Stack ─────────────────────────────────────────
# Usage:
#   cp .env.example .env   # edit to taste
#   docker compose up -d
#
# Services:
#   frontend  — nginx serving the Vue SPA + reverse proxy to backend
#   backend   — Go HTTP API (headless, no Wails GUI)
#   prometheus — metrics collection
#   grafana   — dashboards
#   ollama    — local LLM for AI diagnostics
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Go backend (SaaS HTTP mode) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kubewatcher-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - HOME=/data
    volumes:
      - backend-data:/data                      # SQLite persistence
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro  # K8s access
    ports:
      - "8080:8080"                             # Direct API access (optional)
    networks:
      - kw-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/Ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_started

  # ── Vue frontend via nginx ───────────────────────────────────────
  frontend:
    build:
      context: ./view
      dockerfile: Dockerfile.nginx
    container_name: kubewatcher-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - kw-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kubewatcher-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - kw-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: kubewatcher-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-kubewatcher}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - kw-net
    depends_on:
      prometheus:
        condition: service_started

  # ── Ollama (local LLM) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: kubewatcher-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - kw-net
    # GPU passthrough (NVIDIA GPU + nvidia-docker):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  backend-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  ollama-data:
    driver: local

networks:
  kw-net:
    driver: bridge
