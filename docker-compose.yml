version: "3.9"

# ─── Argus SaaS Stack ─────────────────────────────────────────
# Usage:
#   cp .env.example .env   # edit to taste
#   docker compose up -d
#
# Services:
#   frontend     — nginx serving the Vue SPA + reverse proxy to backend
#   backend      — Go HTTP API (headless, no Wails GUI)
#   alert-ingress— Vector pipeline (replaces custom Go webhook service)
#   prometheus   — metrics collection
#   grafana      — dashboards
#   ollama       — local LLM for AI diagnostics
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Go backend (SaaS HTTP mode) ──────────────────────────────────
  backend:
    build:
      context: kube/backend
      dockerfile: Dockerfile
    container_name: argus-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - HOME=/data
    volumes:
      - backend-data:/data                      # SQLite persistence
      - ${KUBECONFIG:-~/.kube/config}:/root/.kube/config:ro  # K8s access
    ports:
      - "8080:8080"                             # Direct API access (optional)
    networks:
      - kw-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/Ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_started

  # ── Vector alert-ingress (replaces custom Go service) ────────────
  alert-ingress:
    build:
      context: ./kube/alert-ingress
      dockerfile: Dockerfile
    container_name: argus-alert-ingress
    restart: unless-stopped
    ports:
      - "8081:8080"                             # Webhook receiver
    networks:
      - kw-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8686/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Vue frontend via nginx ───────────────────────────────────────
  frontend:
    build:
      context: ./kube/view
      dockerfile: Dockerfile.nginx
    container_name: argus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - kw-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: argus-prometheus
    restart: unless-stopped
    volumes:
      - ./kube/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - kw-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: argus-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-argus}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./kube/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - kw-net
    depends_on:
      prometheus:
        condition: service_started

  # ── Ollama (local LLM) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: argus-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - kw-net

volumes:
  backend-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  ollama-data:
    driver: local

networks:
  kw-net:
    driver: bridge
