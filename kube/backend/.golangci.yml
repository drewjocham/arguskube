# golangci-lint configuration for the Argus backend Go module.
#
# Tested against v2.12.x. Run from kube/backend:
#   golangci-lint run ./...
#
# The linter set was chosen for the Argus Code Review P0.5 findings:
# gosec catches the security-relevant gotchas (insecure file perms,
# SQL injection from string concatenation, unhardened HTTP defaults);
# bodyclose ensures every http.Response.Body is closed so we stop
# leaking connections into the K8s API server pool; paralleltest
# guards against the bare t.Run subtests that share state under -race.
#
# The default linter set (errcheck, govet, ineffassign, staticcheck,
# unused) stays on via `linters.default: standard` — explicit so the
# config doesn't drift if the golangci-lint default set changes.
# Anything noisier than that lands behind a justification in
# linters.exclusions.rules below.
#
# Migrated from v1 to v2 schema 2026-05 — the CI action runs latest,
# which is v2.x. SA1019, G104, G304, G601 stay silenced for the same
# reasons documented in the v1 config history.
version: "2"
run:
  go: "1.25"
  build-tags:
    - integration
linters:
  enable:
    - bodyclose
    - gosec
    - misspell
    - nilerr
    - paralleltest
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G104
        - G304
        - G601
      severity: medium
    misspell:
      locale: US
    paralleltest:
      ignore-missing-subtests: true
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - errcheck
        path: cmd/.*/main\.go
        text: Error return value.*Sync.*not checked
    paths:
      - .*_mock\.go$
      - .*\.pb\.go$
      - frontend
      - build
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - .*_mock\.go$
      - .*\.pb\.go$
      - frontend
      - build
      - vendor
      - third_party$
      - builtin$
      - examples$
