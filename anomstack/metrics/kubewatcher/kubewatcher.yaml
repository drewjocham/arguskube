metric_batch: "kubewatcher"
table_key: "metrics_kubewatcher"
db: "duckdb"
ingest_cron_schedule: "*/5 * * * *"
train_cron_schedule: "*/180 * * * *"
score_cron_schedule: "*/10 * * * *"
alert_cron_schedule: "*/15 * * * *"
change_cron_schedule: "*/15 * * * *"
plot_cron_schedule: "*/30 * * * *"
alert_always: False
alert_metric_timestamp_max_days_ago: 3
disable_llmalert: True
alert_methods: "webhook"
disable_tholdalert: False
tholdalert_methods: "webhook"
tholdalert_thresholds:
  pod_health_pct:
    lower: 80
  node_disk_pressure:
    upper: 0
  node_memory_pressure:
    upper: 0
  pod_crashloop:
    upper: 0
ingest_fn: >
  {% include "./kubewatcher/kubewatcher.py" %}
