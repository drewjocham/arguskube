apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alert-ingress.fullname" . }}
  labels:
    {{- include "alert-ingress.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alert-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alert-ingress.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: alert-ingress
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
              protocol: TCP
          env:
            - name: ALERT_INGRESS_PORT
              value: {{ .Values.service.port | default "8080" | quote }}
            - name: ALERT_INGRESS_MODE
              value: {{ .Values.config.mode | quote }}
            {{- if .Values.config.gcpProject }}
            - name: GCP_PROJECT
              value: {{ .Values.config.gcpProject | quote }}
            {{- end }}
            {{- if .Values.config.gcpTopic }}
            - name: GCP_TOPIC
              value: {{ .Values.config.gcpTopic | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
