apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argus-frontend.fullname" . }}-nginx
  labels:
    {{- include "argus-frontend.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen {{ .Values.service.port | default 3000 }};
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_min_length 256;

        location /api/ {
            proxy_pass http://{{ .Values.backendService }}:{{ .Values.backendPort | default 8080 }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /webhooks/ {
            proxy_pass http://{{ .Values.backendService }}:{{ .Values.backendPort | default 8080 }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /tunnel {
            proxy_pass http://{{ .Values.backendService }}:{{ .Values.backendPort | default 8080 }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

  config.js: |
    window.__KUBEWATCHER_API_BASE__ = "";
