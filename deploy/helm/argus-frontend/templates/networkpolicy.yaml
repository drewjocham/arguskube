{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "argus-frontend.fullname" . }}
  labels:
    {{- include "argus-frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "argus-frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.service.port | default 3000 }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "argus-backend.selectorLabels" . | nindent 10 }}
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
