# ── Image (Vector-based) ───────────────────────────────────────────
image:
  repository: ghcr.io/drewjocham/argus-alert-ingress
  tag: ""
  pullPolicy: IfNotPresent

# ── Replicas ───────────────────────────────────────────────────────
replicaCount: 1
nameOverride: ""
fullnameOverride: ""

# ── Service ────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080
  metricsPort: 8686

# ── Vector Configuration ───────────────────────────────────────────
vector:
  # Log level for Vector itself (trace, debug, info, warn, error)
  logLevel: info
  # Additional Vector config files to include (mounted from ConfigMaps)
  extraConfigs: []

# ── Sinks ──────────────────────────────────────────────────────────
sinks:
  stdout:
    enabled: true
  s3:
    enabled: false
    bucket: ""
    region: ""
  gcpPubSub:
    enabled: false
    project: ""
    topic: "argus-alerts"

# ── Autoscaling ────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ── Resource Limits ────────────────────────────────────────────────
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# ── Security Contexts ──────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Scheduling ─────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
