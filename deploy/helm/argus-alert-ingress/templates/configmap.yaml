apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alert-ingress.fullname" . }}-vector-config
  labels:
    {{- include "alert-ingress.labels" . | nindent 4 }}
data:
  vector.toml: |
    [sources.webhook]
    type = "http_server"
    address = "0.0.0.0:{{ .Values.service.port | default 8080 }}"
    path = "/webhooks/anomstack"

    [transforms.parse]
    type = "remap"
    inputs = ["webhook"]
    source = '''
      . = parse_json!(.message) ?? {}
      .timestamp = now()
    '''

    [sinks.stdout]
    type = "console"
    inputs = ["parse"]
    encoding.codec = "json"

    {{- if .Values.sinks.s3.enabled }}
    [sinks.s3]
    type = "aws_s3"
    inputs = ["parse"]
    bucket = {{ .Values.sinks.s3.bucket | quote }}
    region = {{ .Values.sinks.s3.region | quote }}
    compression = "gzip"
    encoding.codec = "json"
    {{- end }}

    {{- if .Values.sinks.gcpPubSub.enabled }}
    [sinks.gcp_pubsub]
    type = "gcp_pubsub"
    inputs = ["parse"]
    project = {{ .Values.sinks.gcpPubSub.project | quote }}
    topic = {{ .Values.sinks.gcpPubSub.topic | quote }}
    {{- end }}
