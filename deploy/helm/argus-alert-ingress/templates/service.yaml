apiVersion: v1
kind: Service
metadata:
  name: {{ include "alert-ingress.fullname" . }}
  labels:
    {{- include "alert-ingress.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port | default 8080 }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.metricsPort | default 8686 }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "alert-ingress.selectorLabels" . | nindent 4 }}
