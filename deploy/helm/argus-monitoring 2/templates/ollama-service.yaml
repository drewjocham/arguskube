{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "argus-monitoring.fullname" . }}-ollama
  labels:
    {{- include "argus-monitoring.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ollama.service.type | default "ClusterIP" }}
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "argus-monitoring.name" . }}-ollama
{{- end }}
