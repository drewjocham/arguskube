# ── Image ──────────────────────────────────────────────────────────
image:
  repository: ghcr.io/drewjocham/kubewatcher-backend
  tag: ""
  pullPolicy: IfNotPresent

# ── Replicas ───────────────────────────────────────────────────────
replicaCount: 1
nameOverride: ""
fullnameOverride: ""

# ── Service ────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# ── Configuration (ConfigMap) ──────────────────────────────────────
config:
  logLevel: info
  logFormat: json
  tier: pro
  prometheusURL: http://kubewatcher-prometheus:9090
  ollamaBaseURL: http://kubewatcher-ollama:11434
  anomstackURL: ""
  argocdURL: ""
  argocdInsecure: "false"
  kubeContext: ""
  kubeNamespace: ""
  inCluster: "true"
  hash: ""

# ── Environment Secrets (via existing or managed Secret) ──────────
env:
  secret:
    deepseekAPIKey: false
    argocdToken: false
    anomstackAPIKey: false

existingSecret: ""

# ── Autoscaling ────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Persistence ────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

existingPVC: ""

# ── Resource Limits ────────────────────────────────────────────────
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# ── ServiceAccount ─────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""

# ── Security Contexts ──────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ── Scheduling ─────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []

# ── Dev Overrides (scale to 0) ─────────────────────────────────────
dev:
  enabled: false
  persistence:
    enabled: false
  replicaCount: 0
