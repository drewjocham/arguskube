# ── kube-prometheus-stack (Prometheus + Alertmanager + Grafana) ────
kube-prometheus-stack:
  enabled: false

  prometheus:
    prometheusSpec:
      retention: 30d
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: "null"
      receivers:
        - name: "null"

  grafana:
    enabled: true
    # The admin password MUST be supplied at install time:
    #   helm install ... --set kube-prometheus-stack.grafana.adminPassword=$GRAFANA_ADMIN_PASSWORD
    # Or, preferably, point Grafana at an existing Secret you create with
    # `kubectl create secret generic grafana-admin --from-literal=admin-password=…`
    # and set `admin.existingSecret: grafana-admin` here.
    #
    # The previous default ("kubewatcher") was hardcoded — anyone who installed
    # the chart without overriding got a known credential, which is a
    # production-grade vulnerability.
    adminPassword: ""
    defaultDashboardsEnabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    persistence:
      enabled: true
      size: 10Gi

# ── Standalone Grafana (when kube-prometheus-stack is disabled) ────
grafana:
  enabled: false
  prometheusURL: http://kubewatcher-prometheus:9090

# ── Standalone Prometheus (when kube-prometheus-stack is disabled) ─
prometheus:
  enabled: false

# ── Ollama (local LLM) ─────────────────────────────────────────────
ollama:
  enabled: false

  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP

  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 16Gi

  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
