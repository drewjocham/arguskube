{{- if .Values.ollama.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argus-monitoring.fullname" . }}-ollama
  labels:
    {{- include "argus-monitoring.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "argus-monitoring.name" . }}-ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "argus-monitoring.name" . }}-ollama
    spec:
      securityContext:
        {{- toYaml .Values.ollama.podSecurityContext | nindent 8 }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: models
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "argus-monitoring.fullname" . }}-ollama
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
