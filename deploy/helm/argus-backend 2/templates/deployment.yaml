apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argus-backend.fullname" . }}
  labels:
    {{- include "argus-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "argus-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argus-backend.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.config.hash }}
        checksum/config: {{ .Values.config.hash }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "argus-backend.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "argus-backend.fullname" . }}-config
          env:
            - name: HOME
              value: /data
            {{- if .Values.env.secret.deepseekAPIKey }}
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "argus-backend.fullname" .)) }}
                  key: deepseek-api-key
            {{- end }}
            {{- if .Values.env.secret.argocdToken }}
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "argus-backend.fullname" .)) }}
                  key: argocd-token
            {{- end }}
            {{- if .Values.env.secret.anomstackAPIKey }}
            - name: ANOMSTACK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secret" (include "argus-backend.fullname" .)) }}
                  key: anomstack-api-key
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/Ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/Ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.existingPVC | default (printf "%s-data" (include "argus-backend.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
