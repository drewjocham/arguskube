apiVersion: v1
kind: Secret
metadata:
  name: api-gov-secrets
  namespace: api-gov
stringData:
  database_url: "postgres://api-gov:${PG_PASSWORD}@pgbouncer-svc:5432/api-gov?sslmode=disable"
  agent_database_url: "postgresql+psycopg://api-gov:${PG_PASSWORD}@pgbouncer-svc:5432/api-gov"
  agent_redis_url: "redis://redis-svc:6379/0"
  pg_password: "${PG_PASSWORD}"
  llm_api_key: "${LLM_API_KEY}"
  siliconflow_api_key: "${SILICONFLOW_API_KEY}"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: api-gov-store
  namespace: api-gov
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gov-external
  namespace: api-gov
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: api-gov-store
    kind: SecretStore
  target:
    name: api-gov-secrets
  data:
    - secretKey: llm_api_key
      remoteRef:
        key: /api-gov/prod/llm-api-key
    - secretKey: pg_password
      remoteRef:
        key: /api-gov/prod/pg-password
    - secretKey: siliconflow_api_key
      remoteRef:
        key: /api-gov/prod/siliconflow-api-key
