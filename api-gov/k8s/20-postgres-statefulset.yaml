apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: api-gov
spec:
  clusterIP: None
  ports:
    - port: 5432
      name: pg
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: api-gov
spec:
  serviceName: postgres-svc
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
              name: pg
          env:
            - name: POSTGRES_DB
              value: api-gov
            - name: POSTGRES_USER
              value: api-gov
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-gov-secrets
                  key: pg_password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 4
              memory: 16Gi
            limits:
              cpu: 8
              memory: 32Gi
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "api-gov"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "api-gov", "-q"]
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: pgbouncer
          image: bitnami/pgbouncer:1.23
          ports:
            - containerPort: 5432
              name: bouncer
          env:
            - name: PGBOUNCER_DATABASE
              value: "api-gov"
            - name: POSTGRESQL_HOST
              value: "localhost"
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_USERNAME
              value: "api-gov"
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-gov-secrets
                  key: pg_password
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "200"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "50"
            - name: PGBOUNCER_POOL_MODE
              value: "transaction"
            - name: PGBOUNCER_AUTH_TYPE
              value: "plain"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-svc
  namespace: api-gov
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
  selector:
    app: postgres
