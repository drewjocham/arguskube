apiVersion: v1
kind: Namespace
metadata:
  name: api-gov
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gov-config
  namespace: api-gov
data:
  PORT: "8080"
  AGENT_SERVICE_URL: "http://agent-svc:8001"
  AGENT_SERVER_PORT: "8001"
  AGENT_SERVER_HOST: "0.0.0.0"
  AGENT_LOG_LEVEL: "info"
  AGENT_LLM_MODEL: "deepseek-ai/DeepSeek-V3-0324"
  AGENT_DRIFT_THRESHOLD: "0.85"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
