name: deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/argus/api-gov
  IMAGE_AGENT: ghcr.io/argus/api-gov-agent

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25'}
      - run: go vet ./...
        working-directory: backend
      - run: go build ./...
        working-directory: backend
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: pip install ruff && ruff check agents/src middleware/src
      - run: pip install -e ".[dev]" && python -m pytest tests/ -v -x
        working-directory: agents
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: api-gov
          POSTGRES_USER: api-gov
          POSTGRES_PASSWORD: api-gov
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U api-gov"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25'}
      - run: go test ./... -count=1 -race
        working-directory: backend
        env: {DATABASE_URL: "postgres://api-gov:api-gov@localhost:5432/api-gov?sslmode=disable"}
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: pip install -e ".[dev]" && python -m pytest tests/ -v -x
        working-directory: agents
        continue-on-error: true
      - run: pip install -e ".[dev]" && python -m pytest tests/ -v -x
        working-directory: middleware
        continue-on-error: true

  build:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: ${{github.actor}}, password: ${{github.token}}}
      - name: build api
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{env.IMAGE_API}}:${{github.sha}},${{env.IMAGE_API}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: build agent
        uses: docker/build-push-action@v6
        with:
          context: agents
          push: true
          tags: ${{env.IMAGE_AGENT}}:${{github.sha}},${{env.IMAGE_AGENT}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - run: |
          kubectl set image deployment/api api=${{env.IMAGE_API}}:${{github.sha}} --namespace=api-gov --record
          kubectl set image deployment/agent agent=${{env.IMAGE_AGENT}}:${{github.sha}} --namespace=api-gov --record
          kubectl rollout status deployment/api --namespace=api-gov --timeout=5m
          kubectl rollout status deployment/agent --namespace=api-gov --timeout=5m
