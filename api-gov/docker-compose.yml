services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: api-gov
      POSTGRES_USER: api-gov
      POSTGRES_PASSWORD: api-gov
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api-gov"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://api-gov:api-gov@postgres:5432/api-gov?sslmode=disable"
      AGENT_SERVICE_URL: "http://agent:8001"
      LLM_API_KEY: "${LLM_API_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT}"
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: ./agents
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      AGENT_SILICONFLOW_API_KEY: "${SILICONFLOW_API_KEY}"
      AGENT_DATABASE_URL: "postgresql+psycopg://api-gov:api-gov@postgres:5432/api-gov"
      AGENT_REDIS_URL: "redis://redis:6379/0"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_ENDPOINT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
