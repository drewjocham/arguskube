openapi: 3.0.3
info:
  title: KubeWatcher API
  description: |
    SRE console for Kubernetes cluster monitoring, diagnostics, and operations.

    **Transport modes:**
    - **Desktop (Wails):** Methods are called directly via auto-generated TypeScript bindings.
    - **SaaS (HTTP):** All methods are available via `POST /api/{MethodName}` with `{"args": [...]}` body.
  version: 0.1.0
  contact:
    name: Argus Infrastructure
    email: me@djocham.com

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Cluster
    description: Cluster connection, context management, and metadata
  - name: Metrics
    description: Cluster health metrics and time series
  - name: Alerts
    description: Alert detection and anomaly ingestion
  - name: Resources
    description: Kubernetes resource browser (pods, deployments, services, etc.)
  - name: Logs
    description: Pod logs, node logs, and log search
  - name: Topology
    description: Cluster topology graph and application overview
  - name: Deployments
    description: Deployment revisions, scaling, and VPA recommendations
  - name: AI
    description: AI diagnostics, chat, and cluster scanning (Pro tier)
  - name: Vulnerabilities
    description: Container image vulnerability scanning (Trivy)
  - name: FinOps
    description: Cost estimation from resource requests
  - name: Operations
    description: Runbooks, incidents, and notebooks
  - name: Settings
    description: Runtime configuration
  - name: Terminal
    description: Embedded PTY terminal
  - name: Features
    description: Feature gating and tier info
  - name: Webhooks
    description: External webhook ingestion

paths:
  # ── Dynamic RPC dispatch ───────────────────────────────────────────
  /api/{method}:
    post:
      summary: Dynamic RPC dispatch
      description: |
        Calls any public `*App` method by name. This is the SaaS HTTP transport —
        the desktop app uses Wails bindings directly.
      operationId: rpcDispatch
      parameters:
        - name: method
          in: path
          required: true
          schema:
            type: string
          examples:
            listPods:
              value: ListResources
            getMetrics:
              value: GetMetrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                args:
                  type: array
                  items: {}
                  description: Positional arguments matching the Go method signature
            examples:
              listPods:
                value:
                  args: ["pods", "_all"]
              getSettings:
                value:
                  args: []
      responses:
        "200":
          description: Method result
          content:
            application/json:
              schema:
                type: object
                properties:
                  result: {}
                  error:
                    type: string
        "404":
          description: Method not found
        "500":
          description: Internal error

  # ── Webhooks ───────────────────────────────────────────────────────
  /webhooks/anomstack:
    post:
      tags: [Webhooks]
      summary: Ingest anomaly alert
      description: Receives anomaly alerts from Anomstack or custom detectors. Merges into the dashboard alert stream.
      operationId: ingestWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
            example:
              title: "CPU anomaly on web-api"
              metricName: cpu_usage
              threshold: 0.85
              score: 0.97
              severity: critical
              namespace: production
              podName: web-api-7f8d9c6b5-x2k4p
              nodeName: worker-3
              labels:
                app: web-api
                team: platform
      responses:
        "200":
          description: Alert ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  alert_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [ok]

  # ── WebSocket tunnel ───────────────────────────────────────────────
  /tunnel:
    get:
      tags: [Cluster]
      summary: Agent WebSocket tunnel
      description: Bidirectional WebSocket for in-cluster KubeWatcher agents.
      operationId: agentTunnel
      responses:
        "101":
          description: Switching protocols to WebSocket

components:
  schemas:
    # ── Cluster ────────────────────────────────────────────────────
    ClusterInfo:
      type: object
      properties:
        name:
          type: string
          description: Kubeconfig context name
          example: k3s-lab
        nodeCount:
          type: integer
          example: 3
        k8sVersion:
          type: string
          example: v1.29.1+k3s1

    ContextInfo:
      type: object
      properties:
        name:
          type: string
          example: k3s-lab
        cluster:
          type: string
          example: default
        active:
          type: boolean
          example: true

    # ── Metrics ────────────────────────────────────────────────────
    ClusterMetrics:
      type: object
      properties:
        podHealthPct:
          type: number
          format: double
          description: Percentage of pods in Running/Succeeded state
          example: 91.4
        podsRunning:
          type: integer
          example: 32
        podsTotal:
          type: integer
          example: 35
        podsPending:
          type: integer
          example: 0
        podsFailed:
          type: integer
          example: 3
        errorRate:
          type: number
          format: double
          example: 0.08
        errorRatePrev:
          type: number
          format: double
          example: 0.05
        restartCount:
          type: integer
          format: int32
          example: 47
        restartTop:
          type: string
          description: "Top restarter pod: count"
          example: "activepieces-worker: 32"
        warningEvents:
          type: integer
          example: 12
        totalCPUMillis:
          type: integer
          format: int64
          description: Cluster-wide CPU requests in millicores
          example: 4500
        totalMemoryBytes:
          type: integer
          format: int64
          description: Cluster-wide memory requests in bytes
          example: 8589934592
        p99Latency:
          type: string
          description: P99 latency (from Prometheus if configured)
          example: "120ms"
        sloStatus:
          type: string
          enum: [ok, breach, unknown]
          example: ok

    # ── Alerts ─────────────────────────────────────────────────────
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: CrashLoopBackOff — activepieces-worker
        severity:
          type: string
          enum: [critical, warning, info]
        namespace:
          type: string
          example: activepieces
        timestamp:
          type: string
          format: date-time
        podName:
          type: string
        podPhase:
          type: string
          enum: [Running, Pending, Failed, Succeeded, Unknown]
        restartCount:
          type: integer
          format: int32
        containerID:
          type: string
        memoryLimit:
          type: string
          example: 512Mi
        memoryRequest:
          type: string
          example: 256Mi
        cpuLimit:
          type: string
          example: 500m
        cpuRequest:
          type: string
          example: 250m
        cpuThrottle:
          type: number
          format: double
        nodeName:
          type: string
        diskUsage:
          type: number
          format: double
        diskCapacity:
          type: string
        evictedPods:
          type: array
          items:
            type: string
        imageTag:
          type: string
          example: activepieces/activepieces:0.28.0
        previousImage:
          type: string
        deployTime:
          type: string
          format: date-time
        description:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        relatedAlerts:
          type: array
          items:
            type: string
          description: IDs of cascade-correlated alerts

    Tag:
      type: object
      properties:
        label:
          type: string
          example: CrashLoop
        color:
          type: string
          enum: [red, blue, amber, purple, teal]

    LogLine:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        source:
          type: string
          example: activepieces-worker-6f8d9c6b5-x2k4p
        level:
          type: string
          enum: [error, warn, info, ok]
        message:
          type: string

    # ── Resources ──────────────────────────────────────────────────
    ResourceListResult:
      type: object
      properties:
        schema:
          $ref: "#/components/schemas/ResourceSchema"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResourceItem"
        total:
          type: integer

    ResourceSchema:
      type: object
      properties:
        kind:
          type: string
          example: pods
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ResourceColumn"

    ResourceColumn:
      type: object
      properties:
        key:
          type: string
          example: restarts
        label:
          type: string
          example: Restarts
        width:
          type: string
          example: 80px

    ResourceItem:
      type: object
      properties:
        name:
          type: string
          example: caddy-7b9f4d6c8-kx2lp
        namespace:
          type: string
          example: caddy
        status:
          type: string
          example: Running
        statusColor:
          type: string
          enum: [green, red, amber, blue, gray]
        age:
          type: string
          example: 3d
        fields:
          type: object
          additionalProperties:
            type: string
          example:
            restarts: "0"
            node: k3s-lab-worker-1
            cpu: 50m
            memory: 128Mi
            controlled_by: Deployment/caddy
            qos: Burstable

    ResourceDetailResult:
      type: object
      properties:
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        created:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        annotations:
          type: object
          additionalProperties:
            type: string
        properties:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
        data:
          type: object
          additionalProperties:
            type: string
          description: ConfigMap/Secret data entries
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/ResourceCondition"
        events:
          type: array
          items:
            $ref: "#/components/schemas/ResourceEvent"
        extra:
          type: object
          additionalProperties: true

    KeyValue:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    ResourceCondition:
      type: object
      properties:
        type:
          type: string
          example: Ready
        status:
          type: string
          enum: ["True", "False", "Unknown"]
        reason:
          type: string
        message:
          type: string
        age:
          type: string

    ResourceEvent:
      type: object
      properties:
        type:
          type: string
          enum: [Normal, Warning]
        reason:
          type: string
          example: BackOff
        message:
          type: string
        count:
          type: integer
          format: int32
        age:
          type: string

    # ── Topology ───────────────────────────────────────────────────
    TopologyResult:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/TopologyNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/TopologyEdge"

    TopologyNode:
      type: object
      properties:
        id:
          type: string
          description: "Unique ID, e.g. node/worker-1, deploy/default/nginx"
          example: deploy/caddy/caddy
        kind:
          type: string
          enum: [node, deployment, pod, service]
        name:
          type: string
        namespace:
          type: string
        status:
          type: string
          enum: [ok, warn, crit]

    TopologyEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        label:
          type: string

    # ── Applications ───────────────────────────────────────────────
    Application:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        syncStatus:
          type: string
          enum: [Synced, OutOfSync]
        healthStatus:
          type: string
          enum: [Healthy, Degraded, Progressing]
        replicas:
          type: integer
          format: int32
        readyReplicas:
          type: integer
          format: int32
        image:
          type: string
        lastSync:
          type: string

    # ── Deployment Revisions ───────────────────────────────────────
    DeploymentRevision:
      type: object
      properties:
        revision:
          type: string
        replicaSet:
          type: string
        image:
          type: string
        replicas:
          type: integer
        readyReplicas:
          type: integer
        active:
          type: boolean
        changeCause:
          type: string
          description: kubernetes.io/change-cause annotation
        createdAt:
          type: string
          format: date-time

    # ── VPA ────────────────────────────────────────────────────────
    VPARecommendation:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        targetRef:
          type: string
          example: Deployment/web-app
        updateMode:
          type: string
          enum: [Auto, "Off", Initial, Recreate]
        containers:
          type: array
          items:
            $ref: "#/components/schemas/VPAContainerRecommend"
        createdAt:
          type: string
          format: date-time

    VPAContainerRecommend:
      type: object
      properties:
        containerName:
          type: string
        lowerCPU:
          type: string
        lowerMemory:
          type: string
        targetCPU:
          type: string
        targetMemory:
          type: string
        upperCPU:
          type: string
        upperMemory:
          type: string

    # ── Logs ───────────────────────────────────────────────────────
    LogQueryResult:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        total:
          type: integer
        fields:
          type: array
          items:
            type: string
        histogram:
          type: array
          items:
            type: integer
          description: 50-bucket hit distribution over time

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
        message:
          type: string
        pod:
          type: string
        namespace:
          type: string
        container:
          type: string
        node:
          type: string

    NodeLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          example: "May 01 14:32:01"
        level:
          type: string
          enum: [INFO, WARN, ERROR]
        service:
          type: string
          enum: [kubelet, containerd, kube-proxy]
        message:
          type: string

    # ── Vulnerabilities ────────────────────────────────────────────
    ScannedImage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: activepieces/activepieces:0.28.0
        namespace:
          type: string
        lastScan:
          type: string
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        status:
          type: string
        cves:
          type: array
          items:
            $ref: "#/components/schemas/Vulnerability"

    Vulnerability:
      type: object
      properties:
        id:
          type: string
          example: CVE-2024-1234
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        package:
          type: string
        title:
          type: string
        description:
          type: string

    # ── FinOps ─────────────────────────────────────────────────────
    ClusterCostReport:
      type: object
      properties:
        namespaces:
          type: array
          items:
            $ref: "#/components/schemas/CostBreakdown"
        topDeployments:
          type: array
          items:
            $ref: "#/components/schemas/CostBreakdown"
          description: Top 20 deployments by cost
        totalCostHr:
          type: number
          format: double
        totalCostDay:
          type: number
          format: double
        totalCostMo:
          type: number
          format: double
          description: 730 hours/month
        totalCPU:
          type: number
          format: double
          description: Total CPU cores requested
        totalMemGB:
          type: number
          format: double
          description: Total memory in GB
        podCount:
          type: integer

    CostBreakdown:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        kind:
          type: string
          enum: [Namespace, Deployment, Pod]
        cpuCores:
          type: number
          format: double
        memoryGB:
          type: number
          format: double
        cpuCostHr:
          type: number
          format: double
        memCostHr:
          type: number
          format: double
        totalCostHr:
          type: number
          format: double
        totalCostDay:
          type: number
          format: double
        totalCostMo:
          type: number
          format: double
        podCount:
          type: integer

    # ── Settings ───────────────────────────────────────────────────
    SettingsPayload:
      type: object
      properties:
        kubeconfigPath:
          type: string
          description: "Supports colon-separated multi-file, e.g. /path/a:/path/b"
          example: "/Users/you/.kube/config_dir/local-config:/Users/you/.kube/config_dir/k3s-lab-config"
        currentContext:
          type: string
          example: k3s-lab
        namespace:
          type: string
          description: Empty = all namespaces
        deepseekApiKey:
          type: string
          description: Masked on read (sk-…1234), raw on write
        anomstackUrl:
          type: string
          example: http://localhost:8087
        prometheusUrl:
          type: string
          example: http://prometheus:9090
        tier:
          type: string
          enum: [free, pro]
          readOnly: true
        logLevel:
          type: string
          enum: [debug, info, warn, error]
          readOnly: true

    # ── Webhooks ───────────────────────────────────────────────────
    WebhookPayload:
      type: object
      required: [title, severity]
      properties:
        title:
          type: string
          example: CPU anomaly on web-api
        metricName:
          type: string
          example: cpu_usage
        threshold:
          type: number
          format: double
        score:
          type: number
          format: double
        severity:
          type: string
          enum: [critical, warning, info]
        namespace:
          type: string
        podName:
          type: string
        nodeName:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string

    # ── AI / Diagnostics ───────────────────────────────────────────
    ChatEntry:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    AutoSummary:
      type: object
      properties:
        alertID:
          type: string
        summary:
          type: string
        rootCause:
          type: string
        recommendation:
          type: string
        confidence:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time

    AgentEvent:
      type: object
      properties:
        type:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Operations ─────────────────────────────────────────────────
    Runbook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        trigger:
          type: string
        updatedAt:
          type: string
          format: date-time

    Incident:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        type:
          type: string
        status:
          type: string
          enum: [open, investigating, resolved, closed]
        description:
          type: string
        namespace:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FileEntry:
      type: object
      description: Notebook file or folder
      properties:
        path:
          type: string
        name:
          type: string
        isDir:
          type: boolean
        size:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time

    # ── Setup ──────────────────────────────────────────────────────
    ToolStatus:
      type: object
      properties:
        name:
          type: string
          example: kubectl
        installed:
          type: boolean
        version:
          type: string
        path:
          type: string

    SetupResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    # ── Features ───────────────────────────────────────────────────
    FeatureMap:
      type: object
      additionalProperties:
        type: boolean
      example:
        alerts: true
        cluster_view: true
        log_stream: true
        topology: true
        cascade_correlation: true
        anomstack_anomaly: true
        ai_diagnostics: true
        runbook_automation: true
        decision_log_context: true
        multi_cluster: true
        extended_history: true
        custom_runbooks: true
        arguscd: true

    # ── Anomaly Detection ──────────────────────────────────────────
    AnomalyJob:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        metric:
          type: string
        schedule:
          type: string
        status:
          type: string
          enum: [active, paused]

    # ── Popeye Scan ────────────────────────────────────────────────
    PopeyeReport:
      type: object
      properties:
        score:
          type: integer
          description: Overall cluster health score (0-100)
        sections:
          type: array
          items:
            type: object
            properties:
              resource:
                type: string
              issues:
                type: array
                items:
                  type: object
                  properties:
                    level:
                      type: string
                      enum: [ok, info, warn, error]
                    message:
                      type: string
                    resource:
                      type: string

  # ── Wails Binding Reference ──────────────────────────────────────
  # Listed here for documentation; these are not HTTP endpoints but
  # are callable via POST /api/{name} in SaaS mode.
  x-wails-bindings:
    cluster:
      - name: GetClusterInfo
        params: []
        returns: ClusterInfo
      - name: ListContexts
        params: []
        returns: ContextInfo[]
      - name: SwitchContext
        params: [{ name: name, type: string }]
        returns: error
    metrics:
      - name: GetMetrics
        params: []
        returns: ClusterMetrics
      - name: QueryTimeSeriesMetrics
        params:
          - { name: query, type: string }
          - { name: timeRange, type: string }
        returns: float64[]
    alerts:
      - name: GetAlerts
        params: []
        returns: Alert[]
    resources:
      - name: ListResources
        params:
          - { name: kind, type: string, description: "pods, deployments, services, etc." }
          - { name: namespace, type: string, description: "_all for all namespaces" }
        returns: ResourceListResult
      - name: GetResourceDetail
        params:
          - { name: kind, type: string }
          - { name: namespace, type: string }
          - { name: name, type: string }
        returns: ResourceDetailResult
      - name: ListAllNamespaces
        params: []
        returns: string[]
      - name: DeletePod
        params:
          - { name: namespace, type: string }
          - { name: podName, type: string }
        returns: error
    topology:
      - name: GetTopology
        params: [{ name: namespace, type: string }]
        returns: TopologyResult
      - name: ListApplications
        params: [{ name: namespace, type: string }]
        returns: Application[]
      - name: SyncApplication
        params:
          - { name: namespace, type: string }
          - { name: name, type: string }
        returns: error
    logs:
      - name: GetPodLogs
        params:
          - { name: namespace, type: string }
          - { name: podName, type: string }
          - { name: tailLines, type: int64 }
        returns: LogLine[]
      - name: StreamPodLogsFollow
        params:
          - { name: namespace, type: string }
          - { name: podName, type: string }
          - { name: container, type: string }
          - { name: tailLines, type: int64 }
        returns: string[]
      - name: QueryLogs
        params:
          - { name: query, type: string }
          - { name: namespace, type: string }
          - { name: limit, type: int }
        returns: LogQueryResult
      - name: GetNodeLogs
        params:
          - { name: nodeName, type: string }
          - { name: tailLines, type: int }
        returns: NodeLogEntry[]
    deployments:
      - name: GetDeploymentRevisions
        params:
          - { name: namespace, type: string }
          - { name: deployment, type: string }
          - { name: limit, type: int }
        returns: DeploymentRevision[]
      - name: GetVPARecommendations
        params: [{ name: namespace, type: string }]
        returns: VPARecommendation[]
      - name: ScaleDeployment
        params:
          - { name: namespace, type: string }
          - { name: name, type: string }
          - { name: replicas, type: int32 }
        returns: error
      - name: RestartDeployment
        params:
          - { name: namespace, type: string }
          - { name: name, type: string }
